spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/product_catalog}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: INFO
    com.productcatalog: INFO

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
